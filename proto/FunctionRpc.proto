// Azure Functions Language Worker Protocol
// Subset required for the Web Adapter — based on:
// https://github.com/Azure/azure-functions-language-worker-protobuf/blob/dev/src/proto/FunctionRpc.proto
//
// This proto defines the bidirectional gRPC streaming protocol between the
// Azure Functions Host and a language worker. The Web Adapter implements this
// protocol to act as a transparent bridge between the host and any HTTP-based
// web application.

syntax = "proto3";

package azure_functions_worker;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/azure/azure-functions-web-adapter/proto";

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

// The core bidirectional streaming RPC between the host and a worker.
service FunctionRpc {
  rpc EventStream(stream StreamingMessage) returns (stream StreamingMessage) {}
}

// ---------------------------------------------------------------------------
// Top-level envelope
// ---------------------------------------------------------------------------

message StreamingMessage {
  // A unique ID for correlating request/response pairs.
  string request_id = 1;

  oneof content {
    // --- Lifecycle ---
    StartStream start_stream = 20;
    WorkerInitRequest worker_init_request = 17;
    WorkerInitResponse worker_init_response = 16;
    WorkerTerminate worker_terminate = 14;

    // --- Function indexing ---
    FunctionsMetadataRequest functions_metadata_request = 25;
    FunctionMetadataResponse function_metadata_response = 26;

    // --- Function loading ---
    FunctionLoadRequest function_load_request = 8;
    FunctionLoadResponse function_load_response = 9;

    // --- Invocation ---
    InvocationRequest invocation_request = 4;
    InvocationResponse invocation_response = 5;

    // --- Health ---
    WorkerStatusRequest worker_status_request = 12;
    WorkerStatusResponse worker_status_response = 13;
    WorkerHeartbeat worker_heartbeat = 15;

    // --- Environment ---
    FunctionEnvironmentReloadRequest function_environment_reload_request = 6;
    FunctionEnvironmentReloadResponse function_environment_reload_response = 7;
  }
}

// ---------------------------------------------------------------------------
// Lifecycle messages
// ---------------------------------------------------------------------------

message StartStream {
  string worker_id = 2;
}

message WorkerInitRequest {
  string host_version = 1;
  map<string, string> capabilities = 2;
  map<string, string> worker_config = 3;
  string function_app_directory = 4;
}

message WorkerInitResponse {
  string worker_version = 1;
  map<string, string> capabilities = 2;
  StatusResult result = 3;
}

message WorkerTerminate {
  google.protobuf.Timestamp grace_period = 1;
}

// ---------------------------------------------------------------------------
// Function indexing (worker-driven)
// ---------------------------------------------------------------------------

message FunctionsMetadataRequest {
  string function_app_directory = 1;
}

message FunctionMetadataResponse {
  repeated RpcFunctionMetadata function_metadata_results = 1;
  StatusResult result = 2;
  bool use_default_metadata_indexing = 3;
}

message RpcFunctionMetadata {
  string name = 4;
  string directory = 1;
  string script_file = 5;
  string entry_point = 7;
  string function_id = 12;
  bool is_proxy = 6;
  map<string, BindingInfo> bindings = 14;
  string language = 8;
  map<string, string> properties = 15;
  RpcRetryOptions retry_options = 22;
}

message BindingInfo {
  enum BindingType {
    UNKNOWN = 0;
    INPUT = 1;
    OUTPUT = 2;
    TRIGGER = 3;
  }
  BindingType type = 2;
  string direction_string = 100; // "in", "out", "inout"
  string data_type = 4;          // "string", "binary", "stream"
  map<string, string> properties = 5;
}

message RpcRetryOptions {
  int32 max_retry_count = 3;
  RetryStrategy retry_strategy = 4;
  google.protobuf.Timestamp delay_interval = 5;
  google.protobuf.Timestamp minimum_interval = 6;
  google.protobuf.Timestamp maximum_interval = 7;

  enum RetryStrategy {
    EXPONENTIAL_BACKOFF = 0;
    FIXED_DELAY = 1;
  }
}

// ---------------------------------------------------------------------------
// Function loading
// ---------------------------------------------------------------------------

message FunctionLoadRequest {
  string function_id = 1;
  RpcFunctionMetadata metadata = 2;
  bool managed_dependency_enabled = 3;
}

message FunctionLoadResponse {
  string function_id = 1;
  StatusResult result = 2;
  bool is_dependency_downloaded = 3;
}

// ---------------------------------------------------------------------------
// Invocation
// ---------------------------------------------------------------------------

message InvocationRequest {
  string invocation_id = 1;
  string function_id = 2;
  repeated ParameterBinding input_data = 3;
  map<string, TypedData> trigger_metadata = 4;
  RpcTraceContext trace_context = 5;
  google.protobuf.Timestamp retry_context = 6;
}

message InvocationResponse {
  string invocation_id = 1;
  repeated ParameterBinding output_data = 2;
  TypedData return_value = 4;
  StatusResult result = 3;
}

message ParameterBinding {
  string name = 1;
  TypedData data = 2;
}

message TypedData {
  oneof data {
    string string_value = 1;
    string json = 2;
    bytes bytes_value = 3;
    bytes stream = 4;
    RpcHttp http = 5;
    sint64 int_value = 6;
    double double_value = 7;
    CollectionBytes collection_bytes = 8;
    CollectionString collection_string = 9;
    CollectionSInt64 collection_sint64 = 10;
    CollectionDouble collection_double = 11;
    ModelBindingData model_binding_data = 12;
  }
}

message CollectionBytes  { repeated bytes bytes_value = 1; }
message CollectionString { repeated string string_value = 1; }
message CollectionSInt64 { repeated sint64 sint64_value = 1; }
message CollectionDouble { repeated double double_value = 1; }

message ModelBindingData {
  string version = 1;
  string source = 2;
  bytes content = 3;
  string content_type = 4;
}

// ---------------------------------------------------------------------------
// HTTP types (used in TypedData for HTTP triggers)
// ---------------------------------------------------------------------------

message RpcHttp {
  string method = 1;
  string url = 2;
  map<string, string> headers = 3;
  TypedData body = 4;
  map<string, string> params = 10;
  string status_code = 12;
  map<string, NullableString> nullable_headers = 17;
  map<string, TypedData> nullable_params = 18;
  map<string, string> query = 15;
  bool enable_content_negotiation = 16;
  TypedData rawBody = 13;
}

message NullableString {
  oneof value {
    string string_value = 1;
  }
}

// ---------------------------------------------------------------------------
// Trace / Context
// ---------------------------------------------------------------------------

message RpcTraceContext {
  string trace_parent = 1;
  string trace_state = 2;
  map<string, string> attributes = 3;
}

// ---------------------------------------------------------------------------
// Health / Status
// ---------------------------------------------------------------------------

message WorkerStatusRequest {}

message WorkerStatusResponse {}

message WorkerHeartbeat {}

// ---------------------------------------------------------------------------
// Environment Reload (Placeholder / Specialization)
// ---------------------------------------------------------------------------

message FunctionEnvironmentReloadRequest {
  map<string, string> environment_variables = 1;
  string function_app_directory = 2;
}

message FunctionEnvironmentReloadResponse {
  StatusResult result = 1;
  WorkerInitResponse worker_init_response = 2;
}

// ---------------------------------------------------------------------------
// Common
// ---------------------------------------------------------------------------

message StatusResult {
  enum Status {
    FAILURE = 0;
    SUCCESS = 1;
    CANCELLED = 2;
  }
  Status status = 4;
  string result = 1;
  RpcException exception = 2;
  repeated RpcLog logs = 3;
}

message RpcException {
  string source = 2;
  string stack_trace = 1;
  string message = 3;
  string type = 4;
}

message RpcLog {
  string invocation_id = 1;
  string category = 2;
  Level level = 3;
  string message = 4;
  string event_id = 5;
  RpcException exception = 6;

  enum Level {
    TRACE = 0;
    DEBUG = 1;
    INFORMATION = 2;
    WARNING = 3;
    ERROR = 4;
    CRITICAL = 5;
    NONE = 6;
  }
}
